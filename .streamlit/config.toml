# Dark + red 75 Hard look (see examples/ screenshots).
[theme]
base = "dark"
primaryColor = "#E50914"
backgroundColor = "#0B0B0D"
secondaryBackgroundColor = "#16161A"
textColor = "#F5F5F5"
font = "sans serif"

[server]
headless = true
# Bind to localhost only — never 0.0.0.0 / public. Reach it remotely over
# Tailscale (see README), not by exposing this port to the LAN or internet.
address = "localhost"
# Streamlit Cloud ignores server.address, so this is safe there too.

[browser]
# Don't phone home usage stats — keep it private.
gatherUsageStats = false
